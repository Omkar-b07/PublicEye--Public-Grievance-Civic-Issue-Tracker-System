version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: publiceye-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: publiceye-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MONGODB_URI=mongodb://mongodb:27017/publiceye
      - JWT_SECRET=change-this-to-a-secure-secret-key-in-prod
    depends_on:
      - mongodb
    volumes:
      - backend-uploads:/app/static/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: publiceye-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
  backend-uploads:
